spring:
  application:
    name: enterprise-ai-knowledge-assistant
  ai:
    model:
      chat: none
  lifecycle:
    timeout-per-shutdown-phase: 20s

server:
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

info:
  app:
    name: Enterprise AI Knowledge Assistant
    description: Spring Boot and Spring AI MVP
    version: 0.0.1-SNAPSHOT
